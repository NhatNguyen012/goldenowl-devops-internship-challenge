name: Golden Owl CI

on:
  push:
    branches:
      - "feature/**" # trigger on push to feature branches: "CI tests automatically when changes are pushed to the feature branch on GitHub"
  pull_request:
    branches:
      - master # trigger on pull request to master

permissions:
  contents: read

env:
  CI: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check linting
        run: npm int:check

      - name: Check formatting
        run: npm format:check

      - name: Run tests
        run: npm test
        
  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-test # Only run if lint-and-test passes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build --tag goldenowl-image:${{ github.sha }} ./src

      - name: Run container
        run: docker run -d --name goldenowl-app -p 3000:3000 goldenowl-image:${{ github.sha }}

      - name: Verify app response
        run: |
          curl --retry 5 --retry-delay 3 --retry-connrefused http://localhost:3000/ | grep "Welcome warriors to Golden Owl!"
        
      - name: Show container logs on failure
        if: failure()
        run: docker logs goldenowl-app
        
      - name: Remove container
        if: always()
        run: docker rm -f goldenowl-app || true
        