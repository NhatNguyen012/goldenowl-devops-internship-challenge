name: Build, Publish and Deploy to Amazon ECS

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - "**.drawio"
      - "**.png"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE }}
  ECS_CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME }}
  APPLICATION_URL: ${{ vars.APPLICATION_URL }}

concurrency:
  group: production-ecs-deployment
  cancel-in-progress: false

jobs:
  publish-and-deploy:
    name: Publish image and deploy ECS service
    runs-on: ubuntu-latest
    timeout-minutes: 25

    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: goldenowl-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
          allowed-account-ids: ${{ vars.AWS_ACCOUNT_ID }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Prepare immutable image reference
        id: image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA}"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

          if aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids "imageTag=${IMAGE_TAG}" \
            > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image already exists: ${IMAGE_URI}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "New image will be built: ${IMAGE_URI}"
          fi

      - name: Build Docker image
        if: steps.image.outputs.exists == 'false'
        env:
          IMAGE_URI: ${{ steps.image.outputs.uri }}
        run: |
          docker build \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --tag "${IMAGE_URI}" \
            ./src

      - name: Push Docker image
        if: steps.image.outputs.exists == 'false'
        env:
          IMAGE_URI: ${{ steps.image.outputs.uri }}
        run: docker push "$IMAGE_URI"

      - name: Download current ECS task definition
        run: |
          TASK_DEFINITION_ARN="$(
            aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --query 'services[0].taskDefinition' \
              --output text
          )"

          echo "Current task definition: ${TASK_DEFINITION_ARN}"

          aws ecs describe-task-definition \
            --task-definition "$TASK_DEFINITION_ARN" \
            --query taskDefinition \
            > "${RUNNER_TEMP}/task-definition.json"

      - name: Insert new image into task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ runner.temp }}/task-definition.json
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ steps.image.outputs.uri }}

      - name: Deploy task definition to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true
          wait-max-delay-seconds: 15
          max-retries: 3

      - name: Smoke test deployed application
        run: |
          curl --retry 5 --retry-delay 5 --retry-all-errors --fail \
            "${APPLICATION_URL}" | grep "Welcome warriors to Golden Owl!"

      - name: Publish deployment summary
        env:
          IMAGE_URI: ${{ steps.image.outputs.uri }}
          IMAGE_EXISTS: ${{ steps.image.outputs.exists }}
        run: |
          DEPLOYED_TASK_DEFINITION="$(
            aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --query 'services[0].taskDefinition' \
              --output text
          )"

          {
            echo "## Amazon ECS deployment"
            echo
            echo "- Image: \`${IMAGE_URI}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Image already existed: \`${IMAGE_EXISTS}\`"
            echo "- Cluster: \`${ECS_CLUSTER}\`"
            echo "- Service: \`${ECS_SERVICE}\`"
            echo "- Task definition: \`${DEPLOYED_TASK_DEFINITION}\`"
            echo "- Application URL: ${APPLICATION_URL}"
          } >> "$GITHUB_STEP_SUMMARY"